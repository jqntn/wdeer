<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wdeer — hunting vertical slice</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d0a;
        font-family: system-ui, sans-serif;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        outline: none;
      }
      #gate {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #d8e0d0;
        padding: 2rem;
      }
      #gate.show {
        display: flex;
      }
      #gate .card {
        max-width: 32rem;
      }
      #gate h1 {
        font-size: 1.4rem;
        margin: 0 0 0.75rem;
      }
      #gate p {
        line-height: 1.5;
        color: #9aa899;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="gate">
      <div class="card">
        <h1>WebGPU required</h1>
        <p>
          This game runs on the WebGPU rendering backend. Please open it in a
          recent version of Chrome, Edge, or Firefox with WebGPU enabled.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
